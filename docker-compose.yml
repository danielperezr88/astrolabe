# Astrolabe Docker Compose (#273)
# Start: docker compose up -d
# The API key protects the HTTP API when exposed.

services:
  astrolabe:
    build: .
    ports:
      - "127.0.0.1:4747:4747"
    volumes:
      - ./:/workspace:ro
      - astrolabe_data:/home/astrolabe/.astrolabe
    environment:
      - ASTROLABE_API_KEY=${ASTROLABE_API_KEY:?Set ASTROLABE_API_KEY env variable}
    command: ["npx", "astrolabe", "serve", "--host", "0.0.0.0"]
    restart: unless-stopped

volumes:
  astrolabe_data:
