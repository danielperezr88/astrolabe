<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astrolabe Knowledge Graph</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1e1e1e; color: #d4d4d4; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: grid; grid-template-columns: 1fr 280px; height: 100vh;
    }
    #graph-area { position: relative; overflow: hidden; }
    #graph-area svg { width: 100%; height: 100%; }
    .legend {
      position: absolute; top: 8px; left: 8px; background: #2d2d2d;
      padding: 6px 10px; border-radius: 6px; font-size: 10px;
      display: flex; flex-wrap: wrap; gap: 4px; max-width: 320px; z-index: 10;
      pointer-events: none; opacity: 0.85;
    }
    .legend-item { display: flex; align-items: center; gap: 3px; white-space: nowrap; }
    .legend-swatch { width: 7px; height: 7px; border-radius: 2px; }
    #sidebar {
      background: #252526; border-left: 1px solid #3e3e3e;
      padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
    }
    #sidebar .placeholder { color: #666; font-size: 13px; text-align: center; margin-top: 40px; }
    #sidebar .label-badge {
      display: inline-block; padding: 2px 8px; border-radius: 3px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
    }
    #sidebar .name { font-size: 16px; font-weight: 600; word-break: break-all; }
    #sidebar .prop { font-size: 11px; color: #888; }
    #sidebar .prop strong { color: #aaa; display: inline-block; width: 70px; }
    #sidebar .edges-title { font-size: 12px; font-weight: 600; color: #aaa; margin-top: 4px; border-top: 1px solid #3e3e3e; padding-top: 8px; }
    #sidebar .edge-row { font-size: 10px; padding: 2px 0; color: #999; }
    .depth-indicator {
      position: absolute; top: 8px; right: 292px; background: #2d2d2d;
      padding: 3px 8px; border-radius: 4px; font-size: 10px; color: #888; z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="graph-area">
    <div class="legend" id="legend"></div>
    <div class="depth-indicator" id="depth-ind" style="display:none"></div>
    <svg id="graph-svg"></svg>
  </div>
  <div id="sidebar"><div class="placeholder">Click a node to inspect</div></div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
