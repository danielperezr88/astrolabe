<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b81"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#1a508b"/>
    </linearGradient>
  </defs>
  <circle cx="64" cy="64" r="62" fill="url(#bg)" stroke="url(#ring)" stroke-width="2"/>
  <circle cx="64" cy="64" r="50" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.7"/>
  <circle cx="64" cy="64" r="36" fill="url(#blue)" stroke="url(#ring)" stroke-width="1" opacity="0.9"/>
  <circle cx="64" cy="64" r="22" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <!-- Cross-hairs / reticule -->
  <line x1="64" y1="14" x2="64" y2="28" stroke="url(#gold)" stroke-width="2"/>
  <line x1="64" y1="100" x2="64" y2="114" stroke="url(#gold)" stroke-width="2"/>
  <line x1="14" y1="64" x2="28" y2="64" stroke="url(#gold)" stroke-width="2"/>
  <line x1="100" y1="64" x2="114" y2="64" stroke="url(#gold)" stroke-width="2"/>
  <!-- Diagonal lines (degree markers) -->
  <line x1="64" y1="64" x2="64" y2="14" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <line x1="64" y1="64" x2="64" y2="114" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <line x1="64" y1="64" x2="14" y2="64" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <line x1="64" y1="64" x2="114" y2="64" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <!-- 45° degree lines -->
  <line x1="64" y1="64" x2="28" y2="28" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <line x1="64" y1="64" x2="100" y2="28" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <line x1="64" y1="64" x2="28" y2="100" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <line x1="64" y1="64" x2="100" y2="100" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <!-- Star-like center -->
  <polygon points="64,44 68,58 82,60 70,68 74,82 64,74 54,82 58,68 46,60 60,58" fill="url(#gold)" opacity="0.9"/>
  <!-- Secondary inner node -->
  <circle cx="64" cy="64" r="8" fill="#1a1a2e" stroke="url(#ring)" stroke-width="1.5"/>
  <circle cx="64" cy="64" r="3" fill="url(#gold)"/>
  <!-- Outer ring tick marks -->
  <g stroke="url(#gold)" stroke-width="1.5" opacity="0.6">
    <line x1="64" y1="6" x2="64" y2="11"/>
    <line x1="64" y1="117" x2="64" y2="122"/>
    <line x1="6" y1="64" x2="11" y2="64"/>
    <line x1="117" y1="64" x2="122" y2="64"/>
    <!-- 45° ticks -->
    <line x1="23" y1="23" x2="27" y2="27"/>
    <line x1="101" y1="23" x2="97" y2="27"/>
    <line x1="23" y1="101" x2="27" y2="97"/>
    <line x1="101" y1="101" x2="97" y2="97"/>
    <!-- Additional ticks -->
    <line x1="82" y1="10" x2="82" y2="15"/>
    <line x1="46" y1="10" x2="46" y2="15"/>
    <line x1="82" y1="113" x2="82" y2="118"/>
    <line x1="46" y1="113" x2="46" y2="118"/>
    <line x1="10" y1="46" x2="15" y2="46"/>
    <line x1="10" y1="82" x2="15" y2="82"/>
    <line x1="113" y1="46" x2="118" y2="46"/>
    <line x1="113" y1="82" x2="118" y2="82"/>
  </g>
</svg>