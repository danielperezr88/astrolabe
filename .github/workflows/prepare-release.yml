name: Prepare Release

# ── Trigger ─────────────────────────────────────────────────────────────────
# Two trigger modes:
#
# 1. AUTOMATIC: When a staging→main PR is opened or marked ready for review,
#    this workflow runs on staging, generates CHANGELOG + version bump, and
#    commits to staging. The PR automatically picks up the new commit.
#
# 2. MANUAL: workflow_dispatch with dry_run toggle for ad-hoc preparation
#    or validation without a PR.
#
# This ensures the release pipeline never fails due to missing version bumps.

on:
  pull_request:
    branches: [main]
    types: [opened, ready_for_review]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip commit/push)'
        type: boolean
        default: true

jobs:
  prepare:
    name: Prepare Release on Staging
    runs-on: ubuntu-latest
    # Only run for PRs from staging branch (skip other source branches)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.ref == 'staging')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Calculate stable version ──────────────────────────────────────────
      - name: Calculate stable version
        id: version
        run: |
          VERSION=$(node scripts/next-version.mjs --release)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Stable version: ${VERSION}"

      # ── Generate release notes ────────────────────────────────────────────
      - name: Generate release notes
        id: notes
        run: |
          NOTES=$(node scripts/release-notes.mjs)
          {
            echo "notes<<NOTES_EOF"
            echo "$NOTES"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Update CHANGELOG.md ───────────────────────────────────────────────
      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          HEADER="## [${VERSION}] — $(date +%Y-%m-%d)"
          NOTES="${{ steps.notes.outputs.notes }}"

          TEMP=$(mktemp)
          {
            echo "# Changelog"
            echo ""
            echo "${HEADER}"
            echo ""
            echo "${NOTES}"
            echo ""
            tail -n +3 CHANGELOG.md
          } > "${TEMP}"
          mv "${TEMP}" CHANGELOG.md

      # ── Bump workspace versions ───────────────────────────────────────────
      - name: Bump workspace versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          npm pkg set version="$VERSION"
          npm pkg set version="$VERSION" -w packages/shared
          npm pkg set version="$VERSION" -w packages/core
          npm pkg set version="$VERSION" -w packages/cli
          npm pkg set version="$VERSION" -w packages/vscode

      # ── Commit and push to staging ────────────────────────────────────────
      # Runs when:
      #   - Triggered by PR (auto) — always commits (dry_run not applicable)
      #   - Triggered manually with dry_run=false
      - name: Commit and push to staging
        if: >
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.dry_run != 'true')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          git add CHANGELOG.md package.json \
            packages/shared/package.json \
            packages/core/package.json \
            packages/cli/package.json \
            packages/vscode/package.json

          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "chore: prepare release ${TAG} — CHANGELOG + version bump [skip ci]"
            git push origin staging
            echo "✅ Committed and pushed to staging"
          }

      - name: Dry run — skip commit
        if: >
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.dry_run == 'true'
        run: |
          echo "🔲 DRY RUN: Would commit CHANGELOG + version bump for v${{ steps.version.outputs.version }} to staging"
          echo "Run again with dry_run=false to commit."
