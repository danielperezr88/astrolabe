# Release Candidate Pipeline — fires on every push to staging.
# Calculates the next RC version, builds Docker image, publishes to GHCR,
# creates a GitHub pre-release with auto-generated notes.
#
# Supports dry-run mode via workflow_dispatch for pipeline validation
# without shipping (#623).

name: Release Candidate

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — skip publish, push, and release steps (validate pipeline only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write       # push RC tags + create pre-release
  packages: write       # push Docker image to GHCR
  id-token: write       # keyless signing

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Check trigger + dry-run flag ────────────────────────────────────────
  check:
    name: Check trigger
    runs-on: ubuntu-latest
    outputs:
      dry_run: ${{ steps.check.outputs.dry_run }}
    steps:
      - id: check
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          echo "dry_run=${DRY_RUN:-false}" >> "$GITHUB_OUTPUT"
          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN — will validate pipeline without shipping."
          else
            echo "Proceeding with RC release."
          fi

  # ── Gate: tests must pass before we build an RC ─────────────────────────
  test:
    name: Tests (RC gate)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for tags
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm install --no-save --package-lock=false --legacy-peer-deps
      - run: npm run build --workspace packages/shared
      - run: npm run build --workspace packages/core
      - run: npm test
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'
      - run: npm test
        env:
          ASTROLABE_INTEGRATION: '1'
          NODE_OPTIONS: '--max-old-space-size=6144'

  # ── Build RC ────────────────────────────────────────────────────────────
  release-candidate:
    name: Build RC
    runs-on: ubuntu-latest
    needs: [check, test]
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Version calculation ─────────────────────────────────────────────
      - name: Calculate next RC version
        id: version
        run: |
          VERSION=$(node scripts/next-version.mjs --rc)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Next RC version: $VERSION"

      # ── Docker build + push ─────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=rc
            type=sha,prefix=

      - name: Build${{ needs.check.outputs.dry_run != 'true' && ' and push' || '' }} Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ needs.check.outputs.dry_run != 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Security: scan Docker image ──────────────────────────────────────
      - name: Scan image with Trivy
        if: needs.check.outputs.dry_run != 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'

      # ── Sign the image ──────────────────────────────────────────────────
      - name: Install Cosign
        if: needs.check.outputs.dry_run != 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with GitHub OIDC
        if: needs.check.outputs.dry_run != 'true'
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
        env:
          COSIGN_EXPERIMENTAL: '1'

      # ── SBOM + Provenance ───────────────────────────────────────────────
      - name: Generate SBOM (Syft)
        if: needs.check.outputs.dry_run != 'true'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM with Cosign
        if: needs.check.outputs.dry_run != 'true'
        run: |
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
        env:
          COSIGN_EXPERIMENTAL: '1'

      - name: Sign SBOM artifact
        if: needs.check.outputs.dry_run != 'true'
        run: |
          cosign sign-blob --yes --bundle sbom.bundle \
            --output-signature sbom.spdx.json.sig \
            --output-certificate sbom.spdx.json.cert \
            sbom.spdx.json
        env:
          COSIGN_EXPERIMENTAL: '1'

      - name: Upload SBOM as release artifact
        if: needs.check.outputs.dry_run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-rc-${{ steps.version.outputs.version }}
          path: |
            sbom.spdx.json
            sbom.spdx.json.sig
            sbom.spdx.json.cert
          retention-days: 90

      # ── Push RC Git tag ─────────────────────────────────────────────────
      # Uses GitHub API instead of git push to bypass branch protection
      # rules that block GITHUB_TOKEN from pushing tags (#740, #741, #742).
      - name: Push RC tag
        if: needs.check.outputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          SHA="${{ github.sha }}"
          # Check if tag already exists via API (handles re-runs)
          if gh api "repos/${{ github.repository }}/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            gh api "repos/${{ github.repository }}/git/refs" \
              -f ref="refs/tags/$TAG" \
              -f sha="$SHA"
            echo "Created tag $TAG at $SHA via GitHub API."
          fi

      - name: Dry run — skip RC tag push
        if: needs.check.outputs.dry_run == 'true'
        run: |
          echo "🔲 DRY RUN: Would push RC tag v${{ steps.version.outputs.version }}"

      # ── GitHub pre-release ──────────────────────────────────────────────
      - name: Generate release notes
        id: notes
        run: |
          NOTES=$(node scripts/release-notes.mjs)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub pre-release
        if: needs.check.outputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          # Generate contributor list
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CONTRIBUTORS=$(git log ${PREV_TAG}..HEAD --pretty=format:"@%an" | sort -u | tr '\n' ',' | sed 's/,$//')

          gh release create "$TAG" \
            --prerelease \
            --title "RC: ${TAG}" \
            --notes "$(cat <<'NOTESEOF'
          ## 🚧 Release Candidate ${TAG}

          This is a pre-release candidate. Not intended for production use.

          ${{ steps.notes.outputs.notes }}

          **Contributors**: ${CONTRIBUTORS}
          NOTESEOF
          )"

      - name: Dry run — skip GitHub pre-release
        if: needs.check.outputs.dry_run == 'true'
        run: |
          echo "🔲 DRY RUN: Would create GitHub pre-release for v${{ steps.version.outputs.version }}"
          echo "🔲 DRY RUN: Release notes preview:"
          echo "${{ steps.notes.outputs.notes }}"

  # ── Dry run summary ──────────────────────────────────────────────────
  dry-run-summary:
    name: Dry Run Summary
    runs-on: ubuntu-latest
    needs: [check, test, release-candidate]
    if: needs.check.outputs.dry_run == 'true' && always()
    steps:
      - name: Summary
        run: |
          echo "## 🔲 Dry Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "RC pipeline validated successfully without shipping." >> "$GITHUB_STEP_SUMMARY"
          echo "All build and test steps passed." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Steps skipped:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docker push (image was built only)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docker image signing" >> "$GITHUB_STEP_SUMMARY"
          echo "- SBOM generation" >> "$GITHUB_STEP_SUMMARY"
          echo "- Git tag push" >> "$GITHUB_STEP_SUMMARY"
          echo "- GitHub pre-release creation" >> "$GITHUB_STEP_SUMMARY"

  # ── Notify on failure ──────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [check, test, release-candidate]
    if: failure() && always()
    permissions:
      issues: write
    steps:
      - name: Create issue on RC failure
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `RC pipeline failed: ${context.workflow} #${context.runNumber}`,
              body: [
                `**Workflow**: ${context.workflow}`,
                `**Branch**: staging`,
                `**Run**: ${runUrl}`,
                '',
                `@${context.actor} — RC pipeline failure blocks deployment.`,
              ].join('\n'),
              labels: ['bug'],
            });
