name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  # ── Security: dependency review on PRs ───────────────────────────────────
  # TODO: Remove continue-on-error fallback once Dependency Graph is enabled
  # in Settings > Code security and analysis > Dependency graph
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Review dependencies for vulnerabilities
        id: dep-review
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
      - name: Skip if dependency graph not enabled
        if: steps.dep-review.outcome == 'failure'
        run: echo "Dependency Review skipped — enable Dependency Graph in repo Settings > Code security"

  # ── Security: npm audit ──────────────────────────────────────────────────
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run npm audit
        run: npm audit --audit-level=high --omit=dev || true
      - name: Check for critical vulnerabilities
        run: npm audit --audit-level=critical --omit=dev

  unit-test:
    name: Unit Tests (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: ['20']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm install --no-save --package-lock=false --legacy-peer-deps
      - run: npm run build --workspace packages/shared
      - run: npm run build --workspace packages/core
      - name: Run tests
        run: |
          echo "=== Starting vitest at $(date) ==="
          cd packages/core
          timeout 600 npx vitest run --reporter=verbose 2>&1 || { code=$?; echo "=== vitest exited with code $code at $(date) ==="; exit $code; }
          echo "=== Tests completed at $(date) ==="
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm install --no-save --package-lock=false --legacy-peer-deps
      - run: npm run build --workspace packages/shared
      - run: npm run build --workspace packages/core
      - name: Run integration tests
        run: |
          echo "=== Starting integration tests at $(date) ==="
          cd packages/core
          timeout 600 npx vitest run --reporter=verbose 2>&1 || { code=$?; echo "=== vitest exited with code $code at $(date) ==="; exit $code; }
          echo "=== Integration tests completed at $(date) ==="
        env:
          ASTROLABE_INTEGRATION: '1'
          NODE_OPTIONS: '--max-old-space-size=8192'

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Download coverage
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage
          path: coverage/
      - name: Generate PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read coverage summary if available
            let coverageText = 'Coverage data not available.';
            try {
              const summaryPath = path.join('coverage', 'coverage-summary.json');
              if (fs.existsSync(summaryPath)) {
                const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf-8'));
                const total = summary.total || {};
                coverageText = [
                  `| Metric | Value |`,
                  `|--------|-------|`,
                  `| Lines | ${(total.lines?.pct || 0).toFixed(1)}% |`,
                  `| Statements | ${(total.statements?.pct || 0).toFixed(1)}% |`,
                  `| Functions | ${(total.functions?.pct || 0).toFixed(1)}% |`,
                  `| Branches | ${(total.branches?.pct || 0).toFixed(1)}% |`,
                ].join('\n');
              }
            } catch {}

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Coverage Report\n\n${coverageText}\n\nTests: ${context.payload.pull_request ? 'PR checks passed' : 'N/A'}`,
            });

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test, coverage-report]
    if: always() && (needs.unit-test.result == 'failure' || needs.integration-test.result == 'failure')
    permissions:
      issues: write
    steps:
      - name: Create issue on CI failure
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const branch = context.ref.replace('refs/heads/', '');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI failed: ${context.workflow} #${context.runNumber}`,
              body: [
                `**Workflow**: ${context.workflow}`,
                `**Branch**: ${branch}`,
                `**Run**: ${runUrl}`,
                `**Trigger**: ${context.eventName}`,
                '',
                `@${context.actor} — please investigate.`,
              ].join('\n'),
              labels: ['bug'],
            });
