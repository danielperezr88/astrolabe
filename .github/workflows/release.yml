# Stable Release Pipeline — fires on every push to main.
# Calculates the stable version from the latest RC, builds Docker image
# with stable + latest tags, publishes to GHCR, signs with Cosign,
# creates a GitHub release with auto-generated release notes.
#
# Supports dry-run mode via workflow_dispatch for pipeline validation
# without shipping (#623). Includes idempotency check to prevent
# duplicate npm publications and retroactively create GitHub releases
# for versions that already exist on npm (#624).

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — skip publish, push, and release steps (validate pipeline only)'
        required: false
        type: boolean
        default: false

# Prevent infinite loop: the check job skips the pipeline for commits
# authored by github-actions[bot] (CHANGELOG edits, version bumps).
concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: write       # push stable tags + create release
  packages: write       # push Docker image to GHCR
  id-token: write       # keyless signing

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Skip if this is a version-bump commit (prevent infinite loop) ────────
  check:
    name: Check trigger
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      dry_run: ${{ steps.check.outputs.dry_run }}
    steps:
      - id: check
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          echo "dry_run=${DRY_RUN:-false}" >> "$GITHUB_OUTPUT"

          # Skip automated commits on push, but allow all workflow_dispatch runs
          if [ "${{ github.event_name }}" = "push" ]; then
            AUTHOR="${{ github.event.head_commit.author.username }}"
            if [ "$AUTHOR" = "github-actions[bot]" ]; then
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "Skipping — automated commit (author: github-actions[bot])."
              exit 0
            fi
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN — will validate pipeline without shipping."
          else
            echo "Proceeding with release."
          fi

  # ── Gate: full integration tests must pass ──────────────────────────────
  integration-test:
    name: Integration Tests (release gate)
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm install --no-save --package-lock=false --legacy-peer-deps
      - run: npm run build --workspace packages/shared
      - run: npm run build --workspace packages/core
      - run: npm test
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
      - run: npm test
        env:
          ASTROLABE_INTEGRATION: '1'
          NODE_OPTIONS: '--max-old-space-size=8192'

  # ── Publish stable release ─────────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [check, integration-test]
    if: needs.check.outputs.should_release == 'true'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Version calculation ─────────────────────────────────────────────
      - name: Calculate stable version
        id: version
        run: |
          VERSION=$(node scripts/next-version.mjs --release)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Stable version: $VERSION"

      # ── Idempotency check (#624) ─────────────────────────────────────────
      # Check if this version already exists on npm. If so:
      #   - If GH release exists → skip entirely (safe re-run)
      #   - If GH release missing → create it retroactively, skip npm publish
      - name: Idempotency check
        id: idempotency
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          # Check npm registry
          NPM_VERSION=$(npm view @astrolabe-dev/cli version 2>/dev/null || echo "")
          echo "npm_latest=${NPM_VERSION}" >> "$GITHUB_OUTPUT"

          if [ "$NPM_VERSION" = "$VERSION" ]; then
            echo "⚠️  Version $VERSION already exists on npm."
            # Check if GitHub release exists
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "✅ GitHub release $TAG also exists — skipping everything (safe re-run)."
              echo "skip_npm=true" >> "$GITHUB_OUTPUT"
              echo "skip_release=true" >> "$GITHUB_OUTPUT"
              echo "skip_tag=true" >> "$GITHUB_OUTPUT"
            else
              echo "⚠️  GitHub release $TAG does NOT exist — will create it retroactively."
              echo "skip_npm=true" >> "$GITHUB_OUTPUT"
              echo "skip_release=false" >> "$GITHUB_OUTPUT"
              echo "skip_tag=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "✅ Version $VERSION not on npm — proceeding with full release."
            echo "skip_npm=false" >> "$GITHUB_OUTPUT"
            echo "skip_release=false" >> "$GITHUB_OUTPUT"
            echo "skip_tag=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Docker build + push ─────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
            type=raw,value=stable
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.version.outputs.version }}
            type=sha,prefix=

      - name: Build${{ needs.check.outputs.dry_run != 'true' && ' and push' || '' }} Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ needs.check.outputs.dry_run != 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Security: scan Docker image ─────────────────────────────────────
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'

      # ── Smoke test: verify container starts and responds ────────────────
      - name: Run deployment smoke test
        run: bash scripts/smoke-test.sh "${{ steps.version.outputs.version }}"

      # ── Sign the image ──────────────────────────────────────────────────
      - name: Install Cosign
        if: needs.check.outputs.dry_run != 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with GitHub OIDC
        if: needs.check.outputs.dry_run != 'true'
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
        env:
          COSIGN_EXPERIMENTAL: '1'

      # ── SBOM + Provenance ───────────────────────────────────────────────
      - name: Generate SBOM (Syft)
        if: needs.check.outputs.dry_run != 'true'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM with Cosign
        if: needs.check.outputs.dry_run != 'true'
        run: |
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
        env:
          COSIGN_EXPERIMENTAL: '1'

      - name: Sign SBOM artifact
        if: needs.check.outputs.dry_run != 'true'
        run: |
          cosign sign-blob --yes --bundle sbom.bundle \
            --output-signature sbom.spdx.json.sig \
            --output-certificate sbom.spdx.json.cert \
            sbom.spdx.json
        env:
          COSIGN_EXPERIMENTAL: '1'

      - name: Upload SBOM as release artifact
        if: needs.check.outputs.dry_run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.version.outputs.version }}
          path: |
            sbom.spdx.json
            sbom.spdx.json.sig
            sbom.spdx.json.cert
          retention-days: 90

      # ── Push stable Git tag ─────────────────────────────────────────────
      # Uses GitHub API instead of git push to bypass branch protection
      # rules that block GITHUB_TOKEN from pushing to protected main (#704, #706).
      - name: Push stable tag
        if: needs.check.outputs.dry_run != 'true' && steps.idempotency.outputs.skip_tag != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          SHA="${{ github.sha }}"
          # Check if tag already exists via API (handles re-runs)
          if gh api "repos/${{ github.repository }}/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            gh api "repos/${{ github.repository }}/git/refs" \
              -f ref="refs/tags/$TAG" \
              -f sha="$SHA"
            echo "Created tag $TAG at $SHA via GitHub API."
          fi


      # ── Publish to npm ────────────────────────────────────────────────────
      # Auto-bumps workspace versions to the calculated release version.
      # This makes the pipeline self-sufficient even if prepare-release.yml
      # was not run on staging before the staging→main PR (#748).
      # NOTE: CHANGELOG updates still require prepare-release.yml on staging.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
          scope: '@astrolabe-dev'

      - run: npm ci

      - run: npm install --no-save --package-lock=false --legacy-peer-deps

      - name: Bump workspace versions for release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Bumping workspace versions to ${VERSION}..."
          npm pkg set version="${VERSION}" --workspace packages/shared
          npm pkg set version="${VERSION}" --workspace packages/core
          npm pkg set version="${VERSION}" --workspace packages/cli
          echo "✅ Workspace versions set to ${VERSION}"

      - name: Build CLI package
        run: |
          npm run build --workspace packages/shared
          npm run build --workspace packages/core
          npm run build --workspace packages/cli

      - name: Publish @astrolabe-dev/cli to npm
        if: needs.check.outputs.dry_run != 'true' && steps.idempotency.outputs.skip_npm != 'true'
        run: |
          echo "//registry.npmjs.org/:_authToken=$NODE_AUTH_TOKEN" > .npmrc
          npm publish --workspace packages/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run — skip npm publish
        if: needs.check.outputs.dry_run == 'true' || steps.idempotency.outputs.skip_npm == 'true'
        run: |
          if [ "${{ needs.check.outputs.dry_run }}" = "true" ]; then
            echo "🔲 DRY RUN: Would publish @astrolabe-dev/cli@${{ steps.version.outputs.version }} to npm"
          else
            echo "⏭️  SKIPPED: @astrolabe-dev/cli@${{ steps.version.outputs.version }} already exists on npm (idempotency check)"
          fi


      # ── GitHub release ──────────────────────────────────────────────────
      - name: Generate release notes
        id: notes
        run: |
          NOTES=$(node scripts/release-notes.mjs)
          {
            echo "notes<<NOTES_EOF"
            echo "$NOTES"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: needs.check.outputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          NOTES_FILE="/tmp/release-notes.md"

          # Build release notes body
          {
            echo "## 🚀 Release ${TAG}"
            echo ""
            echo "### Docker"
            echo ""
            echo '```bash'
            echo "docker pull ghcr.io/danielperezr88/astrolabe:${VERSION}"
            echo "docker pull ghcr.io/danielperezr88/astrolabe:latest"
            echo '```'
            echo ""
            echo "### CLI"
            echo ""
            echo '```bash'
            echo "npm install -g @astrolabe-dev/cli@${VERSION}"
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "${{ steps.notes.outputs.notes }}"
          } > "$NOTES_FILE"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, updating notes..."
            gh release edit "$TAG" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" \
              --title "Release ${TAG}" \
              --notes-file "$NOTES_FILE"
          fi

      - name: Dry run — skip GitHub release
        if: needs.check.outputs.dry_run == 'true'
        run: |
          echo "🔲 DRY RUN: Would create GitHub release for v${{ steps.version.outputs.version }}"
          echo "🔲 DRY RUN: Release notes preview:"
          echo "${{ steps.notes.outputs.notes }}"

  # ── Dry run summary ──────────────────────────────────────────────────
  dry-run-summary:
    name: Dry Run Summary
    runs-on: ubuntu-latest
    needs: [check, integration-test, release]
    if: needs.check.outputs.dry_run == 'true' && always()
    steps:
      - name: Summary
        run: |
          echo "## 🔲 Dry Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pipeline validated successfully without shipping." >> "$GITHUB_STEP_SUMMARY"
          echo "All build and test steps passed." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Steps skipped:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docker push (image was built only)" >> "$GITHUB_STEP_SUMMARY"
          echo "- npm publish" >> "$GITHUB_STEP_SUMMARY"
          echo "- Git tag push" >> "$GITHUB_STEP_SUMMARY"
          echo "- GitHub release creation" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docker image signing" >> "$GITHUB_STEP_SUMMARY"
          echo "- SBOM generation" >> "$GITHUB_STEP_SUMMARY"

  # ── Notify on failure ──────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [check, integration-test, release]
    if: failure() && always()
    permissions:
      issues: write
    steps:
      - name: Create issue on release failure
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release pipeline failed: ${context.workflow} #${context.runNumber}`,
              body: [
                `**Workflow**: ${context.workflow}`,
                `**Branch**: main`,
                `**Run**: ${runUrl}`,
                '',
                `@${context.actor} — Release pipeline failure requires immediate attention.`,
              ].join('\n'),
              labels: ['bug'],
            });
